services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: listingmanager_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor        # keep vendor inside container
      - /var/www/html/node_modules  # keep node_modules inside container
    environment:
      - APP_ENV=local
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - listingmanager

  nginx:
    image: nginx:alpine
    container_name: listingmanager_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - listingmanager

  mysql:
    image: mysql:8.0
    container_name: listingmanager_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: listingmanager
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"   # 3307 so it won't conflict with your local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - listingmanager

volumes:
  mysql_data:

networks:
  listingmanager:
    driver: bridge
